<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>抽奖系统 | 冠恩先生 | Mr Gauen</title>
    <link rel="icon" type="image/webp" sizes="32x32" href="/assets/images/favicon-32x32.ico">
    <link rel="stylesheet" href="/assets/css/lottery.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <a href="/" class="back-home">
            <i class="fas fa-home"></i> 返回首页
        </a>
        <h1>幸运抽奖</h1>
        <p>欢迎参与抽奖活动，试试您的运气！</p>
        
        <div id="loginStatus">
            <span id="loginMessage">请先登录后再进行抽奖</span>
            <a id="loginRedirectLink" href="/user/user_login.php">立即登录</a>
        </div>
    </header>
    
    <main class="lottery-container">
        <div class="wheel-container" id="wheelContainer">
            <div class="wheel-pointer"></div>
            </div>
        
        <div class="control-panel">
            <button id="drawButton">开始抽奖</button>
            
            <div class="action-btn-wrapper">
                <button id="manageAddressBtn" class="action-btn-outline">
                    <i class="fas fa-map-marker-alt"></i> 填写/修改收货信息
                </button>
            </div>
            
            <div class="lottery-info">
                <div class="draw-count" id="drawCount">剩余抽奖次数: 99</div>
                <div class="countdown" id="countdown" style="display: none;"></div>
            </div>
        </div>
        
        <div class="lists-wrapper">
            <div class="winner-scroll-container">
                <div class="section-header">
                    <h3><i class="fas fa-gift"></i> 中奖名单</h3>
                </div>
                <div class="winner-scroll-content">
                    <div class="winner-scroll-list" id="winnerScrollList">
                        </div>
                </div>
            </div>
            
            <div class="draw-records">
                <div class="section-header">
                    <h3><i class="fas fa-history"></i> 抽奖记录</h3>
                </div>
                <div class="records-content" id="recordsContainer">
                    </div>
            </div>
        </div>
    </main>
    
    <div class="result-modal" id="resultModal">
        <div class="modal-content">
            <h2 id="modalTitle">抽奖结果</h2>
            <p id="modalMessage">恭喜您获得了...</p>
            <button id="closeResultBtn" class="modal-btn-primary">确定</button>
        </div>
    </div>

    <div class="result-modal" id="addressModal">
        <div class="modal-content">
            <h2>填写收货信息</h2>
            <form id="addressForm">
                <input type="hidden" id="winRecordId">
                
                <div class="form-group">
                    <label>收件人姓名</label>
                    <input type="text" id="receiverName" class="form-input" required>
                </div>
                
                <div class="form-group">
                    <label>联系电话</label>
                    <input type="tel" id="receiverPhone" class="form-input" required>
                </div>
                
                <div class="form-group">
                    <label>详细地址</label>
                    <textarea id="receiverAddress" class="form-input" rows="3" required></textarea>
                </div>
                
                <div class="btn-group">
                    <button type="button" id="addressModalClose" class="modal-btn-secondary">取消</button>
                    <button type="submit" class="modal-btn-submit">提交信息</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="/assets/js/lottery.js"></script>
    <script src="/assets/js/lottery-ui.js"></script>
</body>
</html>
