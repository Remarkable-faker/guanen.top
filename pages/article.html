<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冠恩书屋</title>
<style>
/* 现代简约设计系统 - 温柔淡雅风格 */
:root {
  /* 调色盘 - 柔和自然色系 */
  --bg-main: #fcfaf7;              /* 米白色背景 - 类似纸张 */
  --bg-sidebar: rgba(255, 255, 255, 0.7); /* 半透明侧边栏 */
  --primary-soft: #8ba8a0;         /* 灰绿色 - 主色调 */
  --primary-deep: #5a7a72;         /* 深灰绿 */
  --accent-soft: #d4a373;          /* 柔和金棕 - 强调色 */
  --text-main: #3d405b;            /* 深蓝灰文本 */
  --text-muted: #81b29a;           /* 辅助色 */
  --text-light: #adb5bd;           /* 浅灰色文本 */
  --border-color: rgba(0, 0, 0, 0.05);
  --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.04);
  --shadow-medium: 0 15px 40px rgba(0, 0, 0, 0.08);
  
  /* 间距与圆角 */
  --radius-sm: 8px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.library-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 20px;
  background: white;
  border: 1px solid var(--border-color);
  border-radius: 30px;
  color: var(--primary-deep);
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
  transition: var(--transition);
  box-shadow: var(--shadow-soft);
  margin-left: 20px;
  white-space: nowrap;
}

.library-btn:hover {
  background: var(--primary-soft);
  color: white;
  transform: translateY(-2px);
  box-shadow: var(--shadow-medium);
  border-color: var(--primary-soft);
}

.library-btn svg {
  width: 18px;
  height: 18px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background-color: var(--bg-main);
  color: var(--text-main);
  line-height: 1.8;
  overflow-x: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* 隐藏滚动条但保留功能 */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}
::-webkit-scrollbar-thumb {
  background: rgba(0, 0, 0, 0.1);
  border-radius: 10px;
}
::-webkit-scrollbar-track {
  background: transparent;
}

/* 顶部导航栏优化 */
header {
  padding: 15px 40px;
  background: var(--bg-sidebar);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-color);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
}

.header-content {
  display: flex;
  align-items: center;
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
}

.logo-container {
  display: flex;
  align-items: center;
  gap: 15px;
}

.logo-container img {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  object-fit: cover;
  box-shadow: var(--shadow-soft);
}

.logo-container h1 {
  font-size: 20px;
  font-weight: 600;
  color: var(--text-main);
  letter-spacing: 1px;
}

.header-text {
  flex: 1;
  text-align: center;
}

.header-quote {
  font-size: 15px;
  color: var(--primary-soft);
  font-style: italic;
  font-weight: 400;
}

.sisyphus-svg {
  opacity: 0.6;
}

/* 主容器布局 */
.main-content {
  flex: 1;
  display: flex;
  height: calc(100vh - 73px);
  position: relative;
}

.container {
  display: flex;
  width: 100%;
  height: 100%;
}

/* 侧边栏样式重构 */
.sidebar {
  width: 280px;
  background: var(--bg-sidebar);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border-right: 1px solid var(--border-color);
  padding: 30px 15px;
  overflow-y: auto;
  transition: var(--transition);
  z-index: 90;
}

.sidebar-header {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 20px;
  padding-left: 15px;
}

.sidebar ul {
  list-style: none;
}

.sidebar li {
  margin-bottom: 8px;
}

.li-main {
  padding: 12px 16px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: var(--transition);
  background: transparent;
}

.li-main:hover {
  background: rgba(255, 255, 255, 0.8);
  transform: translateX(5px);
}

li.active > .li-main {
  background: white;
  box-shadow: var(--shadow-soft);
  color: var(--primary-deep);
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  box-shadow: 0 0 10px rgba(0,0,0,0.05);
}

.item-title {
  font-size: 15px;
  font-weight: 500;
}

.item-subtitle {
  font-size: 11px;
  color: var(--text-light);
  margin-top: 2px;
}

.arrow {
  margin-left: auto;
  width: 6px;
  height: 6px;
  border-right: 2px solid var(--text-light);
  border-bottom: 2px solid var(--text-light);
  transform: rotate(-45deg);
  transition: var(--transition);
}

li.open > .li-main .arrow {
  transform: rotate(45deg);
}

.child-list {
  padding-left: 20px;
  margin-top: 5px;
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

li.open > .child-list {
  max-height: 2000px;
}

/* 内容区域优化 - 阅读体验核心 */
.content {
  flex: 1;
  padding: 60px 0;
  overflow-y: auto;
  scroll-behavior: smooth;
  background: transparent;
}

.article-wrapper {
  max-width: 760px;
  margin: 0 auto;
  padding: 0 40px;
}

.content h2 {
  font-size: 32px;
  font-weight: 600;
  margin-bottom: 40px;
  color: var(--text-main);
  line-height: 1.3;
  text-align: center;
}

.content p {
  margin-bottom: 24px;
  font-size: 17px;
  color: var(--text-main);
  opacity: 0.9;
  text-align: justify;
}

/* 章节导航 - 优雅的浮动设计 */
.chapter-sidebar {
  width: 260px;
  padding: 30px 20px;
  background: transparent;
  border-left: 1px solid var(--border-color);
  overflow-y: auto;
  transition: var(--transition);
}

.chapter-header {
  margin-bottom: 25px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.chapter-header h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

.chapter-item {
  padding: 10px 15px;
  border-radius: var(--radius-sm);
  margin-bottom: 5px;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 12px;
}

.chapter-item:hover {
  background: rgba(255, 255, 255, 0.5);
}

.chapter-item.active {
  background: white;
  box-shadow: var(--shadow-soft);
}

.chapter-number {
  font-size: 12px;
  font-weight: 700;
  color: var(--primary-soft);
  min-width: 20px;
}

.chapter-title {
  font-size: 14px;
  color: var(--text-main);
}

/* 移动端菜单按钮 - 现代化悬浮设计 */
.mobile-menu-button {
  display: none;
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--primary-soft);
  color: white;
  border: none;
  box-shadow: 0 10px 25px rgba(139, 168, 160, 0.4);
  z-index: 1001;
  cursor: pointer;
  justify-content: center;
  align-items: center;
  transition: var(--transition);
}

.mobile-menu-button:active {
  transform: scale(0.9);
}

.mobile-menu-button svg {
  width: 24px;
  height: 24px;
}

/* 响应式适配 */
@media (max-width: 1024px) {
  .chapter-sidebar {
    display: none; /* 平板端暂时隐藏右侧章节，可通过内容区按钮呼出 */
  }
}

@media (max-width: 768px) {
  header {
    padding: 15px 20px;
  }
  
  .header-quote, .sisyphus-svg {
    display: none;
  }
  
  .library-btn {
    padding: 6px 12px;
    font-size: 13px;
    margin-left: 10px;
  }
  
  .library-btn span {
    display: none;
  }
  
  .library-btn svg {
    margin: 0;
  }
  
  .sidebar {
    position: fixed;
    left: -100%;
    top: 0;
    height: 100vh;
    width: 80%;
    max-width: 300px;
    box-shadow: var(--shadow-medium);
  }
  
  .sidebar.mobile-open {
    left: 0;
  }
  
  .content {
    padding: 40px 0;
  }
  
  .article-wrapper {
    padding: 0 25px;
  }
  
  .content h2 {
    font-size: 26px;
    margin-bottom: 30px;
  }
  
  .mobile-menu-button {
    display: flex;
  }
  
  /* 移动端章节导航改为底部抽屉或点击呼出，这里先简单隐藏 */
  .chapter-sidebar {
    display: none;
  }
}

/* 动画效果 */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.content.fade-in {
  animation: fadeIn 0.6s ease forwards;
}

/* 特殊排版组件 */
.quote {
  background: rgba(212, 163, 115, 0.05);
  border-left: 3px solid var(--accent-soft);
  padding: 20px 30px;
  margin: 40px 0;
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
}

/* 骨架屏动画效果 - 模拟内容加载中的占位状态 */
 .skeleton { 
     background: #eee; 
     background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%); 
     border-radius: 8px; 
     background-size: 200% 100%; 
     animation: shine 1.5s linear infinite; /* 呼吸感动画 */
 } 
 
 @keyframes shine { 
     to { 
         background-position-x: -200%; 
     } 
 } 
 
 /* 骨架屏具体形状定义 */ 
 .skeleton-title { height: 32px; width: 60%; margin: 0 auto 20px auto; } /* 标题占位 */
 .skeleton-text { height: 16px; width: 100%; margin-bottom: 10px; } /* 正文占位 */
 
 #article-loader {
     display: none; /* 初始状态隐藏，仅在加载时通过 JS 显示 */
     padding: 20px 0;
 }
</style>

<!-- 引入文章数据 -->
<script src="../assets/js/articleData.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const sidebarList = document.getElementById('sidebarList'); // 目录列表容器
  const contentDiv = document.getElementById('content'); // 主内容区域容器
  const articleWrapper = document.getElementById('articleWrapper'); // 文章内容包装器
  const articleLoader = document.getElementById('article-loader'); // 骨架屏加载器
  const chapterList = document.getElementById('chapterList'); // 章节列表容器
  const mobileMenuButton = document.getElementById('mobileMenuButton'); // 移动端菜单按钮
  const sidebar = document.getElementById('sidebar'); // 侧边栏容器

  // 1. 渲染目录树 (Sidebar)
  function renderSidebar(data) {
    sidebarList.innerHTML = '';
    const ul = document.createElement('ul');
    
    // 获取排序后的分类键
    const sortedCatKeys = Object.keys(data).sort();
    
    for (const catKey of sortedCatKeys) {
      const category = data[catKey];
      const li = document.createElement('li');
      
      li.innerHTML = `
        <div class="li-main">
          <div class="dot" style="background-color:${category.color || 'var(--primary-soft)'}"></div>
          <div class="item-text">
            <span class="item-title">${category.title}</span>
          </div>
          <div class="arrow"></div>
        </div>
      `;
      
      const childUl = document.createElement('ul');
      childUl.className = 'child-list';
      
      // 获取排序后的文章键
      const sortedArtKeys = Object.keys(category.children).sort();
      
      for (const artKey of sortedArtKeys) {
        const article = category.children[artKey];
        const artLi = document.createElement('li');
        artLi.className = 'article-item';
        artLi.innerHTML = `
          <div class="li-main">
            <div class="dot" style="border: 2px solid ${article.color || 'var(--accent-soft)'}; background: transparent;"></div>
            <div class="item-text">
              <span class="item-title">${article.title}</span>
              ${article.author ? `<span class="item-subtitle">${article.author}</span>` : ''}
            </div>
          </div>
        `;
        
        artLi.onclick = (e) => {
          e.stopPropagation();
          selectArticle(article, artLi);
        };
        
        childUl.appendChild(artLi);
      }
      
      li.appendChild(childUl);
      
      // 分类展开/折叠
      li.querySelector('.li-main').onclick = () => {
        const isOpen = li.classList.contains('open');
        if (isOpen) {
          li.classList.remove('open');
        } else {
          li.classList.add('open');
        }
      };
      
      ul.appendChild(li);
    }
    sidebarList.appendChild(ul);
  }

  // 2. 选择文章
  function selectArticle(articleData, element) {
    // 侧边栏激活状态
    document.querySelectorAll('.article-item').forEach(i => i.classList.remove('active'));
    element.classList.add('active');

    // 移动端关闭侧边栏
    if (window.innerWidth <= 768) {
      sidebar.classList.remove('mobile-open');
    }

    // 更新章节侧边栏
    renderChapterList(articleData);

    // 默认显示第一章
    if (articleData.chapters && articleData.chapters.length > 0) {
      renderChapter(articleData.chapters[0], articleData);
    } else {
      // 如果没有章节，也显示一下加载状态
      articleWrapper.style.display = 'none';
      articleLoader.style.display = 'block';
      
      setTimeout(() => {
        articleWrapper.innerHTML = `
          <h2 style="margin-top: 40px; text-align: center;">${articleData.title}</h2>
          <div style="text-align:center; color:var(--text-light); margin-top:40px;">暂无内容</div>
        `;
        articleLoader.style.display = 'none';
        articleWrapper.style.display = 'block';
      }, 500);
    }
  }

  // 3. 渲染章节列表
  function renderChapterList(articleData) {
    chapterList.innerHTML = '';
    
    if (!articleData.chapters) return;
    
    articleData.chapters.forEach((chapter, index) => {
      const item = document.createElement('div');
      item.className = 'chapter-item';
      if (index === 0) item.classList.add('active');
      
      item.innerHTML = `
        <div class="chapter-number">${chapter.number}</div>
        <div class="chapter-title">${chapter.title}</div>
      `;
      
      item.onclick = () => {
        document.querySelectorAll('.chapter-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        renderChapter(chapter, articleData);
      };
      
      chapterList.appendChild(item);
    });
  }

  // 4. 渲染章节内容
  function renderChapter(chapter, articleData) {
    // 显示骨架屏加载状态，提升用户体验
    articleWrapper.style.display = 'none'; // 隐藏真实内容
    articleLoader.style.display = 'block'; // 显示骨架屏
    
    // 内容切换时的淡入淡出动画
    contentDiv.style.opacity = '0';
    contentDiv.style.transform = 'translateY(10px)';
    contentDiv.style.transition = 'all 0.3s ease';
    
    // 模拟加载延迟，展示骨架屏效果
    setTimeout(() => {
      // 填充文章内容
      articleWrapper.innerHTML = `
        <div class="chapter-meta" style="font-size: 13px; color: var(--primary-soft); margin-bottom: 10px; text-align: center; letter-spacing: 1px;">
          ${articleData.title} · 第 ${chapter.number} 章
        </div>
        <h2 style="margin-bottom: 15px; text-align: center;">${chapter.title}</h2>
        
        <div class="article-info" style="text-align: center; font-size: 13px; color: var(--text-light); margin-bottom: 40px; display: flex; justify-content: center; gap: 15px;">
          ${articleData.author ? `<span>作者：${articleData.author}</span>` : ''}
          ${articleData.date ? `<span>日期：${articleData.date}</span>` : ''}
        </div>

        <div class="article-content">
          ${chapter.content}
        </div>
        <div style="margin-top: 60px; padding-top: 30px; border-top: 1px solid var(--border-color); text-align: center; color: var(--text-light); font-size: 14px; letter-spacing: 2px;">
          THE END
        </div>
      `;
      
      // 渲染完成后，隐藏骨架屏并显示真实内容
      articleLoader.style.display = 'none';
      articleWrapper.style.display = 'block';
      
      // 恢复内容区域显示
      contentDiv.style.opacity = '1';
      contentDiv.style.transform = 'translateY(0)';
      contentDiv.scrollTop = 0;
      
      // 更新页面标题，方便 SEO 和用户识别
      document.title = `${chapter.title} - ${articleData.title} - 冠恩书屋`;
    }, 800); // 延迟 800ms，确保用户能感受到平滑的加载过渡
  }

  // 5. 移动端菜单
  mobileMenuButton.onclick = (e) => {
    e.stopPropagation();
    sidebar.classList.toggle('mobile-open');
  };

  // 点击其他地方关闭侧边栏
  document.addEventListener('click', (e) => {
    if (window.innerWidth <= 768 && 
        !sidebar.contains(e.target) && 
        !mobileMenuButton.contains(e.target) && 
        sidebar.classList.contains('mobile-open')) {
      sidebar.classList.remove('mobile-open');
    }
  });

  // 6. 初始化
  renderSidebar(articles);
  
  // 默认显示欢迎页面，所有目录默认收起
  
  // 初始状态下隐藏章节侧边栏内容或显示提示
  chapterList.innerHTML = '<div style="text-align:center; color:var(--text-light); padding:20px; font-size:13px;">请选择文章以查看章节</div>';
});
</script>
</body>
</html>
