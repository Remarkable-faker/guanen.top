<!--?xml version="1.0" encoding="utf-8"?-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="256" height="256" role="img" aria-label="Instagram">
  <defs>
    <linearGradient id="igGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#feda75"></stop>
      <stop offset="25%" stop-color="#fa7e1e"></stop>
      <stop offset="50%" stop-color="#d62976"></stop>
      <stop offset="75%" stop-color="#962fbf"></stop>
      <stop offset="100%" stop-color="#4f5bd5"></stop>
    </linearGradient>
  </defs>

  <!-- 圆角方形背景（渐变）-->
  <rect x="42" y="42" width="428" height="428" rx="90" ry="90" fill="url(#igGrad)"></rect>

  <!-- 内层白边 -->
  <rect x="106" y="106" width="300" height="300" rx="65" ry="65" fill="none" stroke="#fff" stroke-width="34" opacity="0.95"></rect>

  <!-- 镜头圆 -->
  <circle cx="256" cy="256" r="80" fill="#fff"></circle>

  <!-- 中心小圆（模拟镜头黑色）-->
  <circle cx="256" cy="256" r="44" fill="rgba(0,0,0,0.85)"></circle>

  <!-- 右上角小圆点（闪光/取景器） -->
  <circle cx="362" cy="150" r="20" fill="#fff"></circle>

</svg>
